name: Release

on:
  release:
    types: [created]

permissions:
  contents: write   # нужно для прикрепления ассета к релизу

jobs:
  pack:
    name: zip-бандл расширения
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # gnome-extensions недоступен на runner — pack.sh соберёт бандл через zip.
      - name: Сборка бандла
        run: ./packaging/pack.sh

      - name: Прикрепить zip к релизу
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" dist/klippa@local.shell-extension.zip --clobber
