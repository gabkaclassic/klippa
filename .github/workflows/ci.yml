name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: pytest (ядро демона)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Демон работает на системном python с gi/cryptography (как на целевой
      # машине), поэтому ставим те же системные пакеты, что и install.sh.
      # Так прогоняется весь набор, включая тест миниатюр (GdkPixbuf).
      - name: Системные зависимости
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi gir1.2-glib-2.0 gir1.2-gdkpixbuf-2.0 gir1.2-secret-1 \
            python3-cryptography python3-pytest

      - name: pytest
        working-directory: daemon
        run: PYTHONPATH=. python3 -m pytest -q
